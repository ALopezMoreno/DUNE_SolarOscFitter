################################################################################
#               Solar Oscillation Fitter — Configuration File                  #
################################################################################
#
#  RunMode: MCMC | LLH | derived | PROFILE
#  Asimov:  true  → generate fake data from true_* values below
#           false → read real data from data_file
#
################################################################################


# ── 1. RUN CONTROL ──────────────────────────────────────────────────────────

outFile:  "outputs/EXAMPLE_OUTPUT"  # output file prefix
# prevFile: "outputs/my_previous_run"              # resume from saved chain state

RunMode:  "MCMC"   # MCMC | LLH | derived | PROFILE
Asimov:   true

fastFit:  true    # fast Earth model (recommended; set false for higher accuracy)
nuFast:   false   # C++ nuFast oscillation library (incompatible with multithreading)


# ── 2. ASIMOV TRUTH ─────────────────────────────────────────────────────────
# Ground-truth values used to generate Asimov data (Asimov: true only).
# Set independently of prior centres to enable bias / wrong-prior studies.

true_sin2_th12:           0.307     # solar mixing angle
true_sin2_th13:           0.0224    # reactor mixing angle (δCP and θ₂₃ fixed)
true_dm2_21:              6e-5      # solar Δm² (eV²)  [PDG: 7.53e-5, SNO: 5.11e-5]
true_integrated_HEP_flux: 8250.0   # HEP flux (ν/cm²/s)
true_cc_xsec_norm:        1.0       # CC xsec scale relative to MARLEY


# ── 3. PRIORS ───────────────────────────────────────────────────────────────
# Distributions.jl syntax.  All parameters are sampled during MCMC / LLH.

# Oscillation parameters
prior_sin2_th12: Uniform(0.15, 0.5)
prior_sin2_th13: truncated(Normal(0.022, 0.0007), 0.005, 0.035)  # reactor constraint
prior_dm2_21:    Uniform(2e-5, 3e-4)

# Solar flux
prior_8B_flux:  truncated(Normal(5.25e6, 0.28e6), 1.5e6, 1e7)   # SNO NC, ~5.3%
# alternatives: Uniform(1e5, 2e7)  |  truncated(Normal(5.46e6, 0.22e6), 1.5e6, 1e7)
prior_HEP_flux: Uniform(0, 2e4)

# CC cross-section shape  (all relative to MARLEY; see CLAUDE.md for details)
prior_cc_xsec_norm: truncated(Normal(1.0, 0.1), 0.1, 2.0)  # overall scale
prior_cc_xsec_tilt: Normal(0.0, 0.1)                        # power-law slope shift
prior_cc_xsec_curv: Normal(0.0, 0.05)                       # quadratic curvature


# ── 4. SAMPLER ──────────────────────────────────────────────────────────────

nChains:           10    # parallel HMC chains  (≈ number of CPU cores)
nSteps:            300   # post-tuning steps per chain
nTuning:           50    # steps per tuning cycle
maxTuningAttempts: 30    # tuning cycles  (0 = skip tuning)

earth_potential_uncertainties: true   # marginalise over Earth density profile

# proposal_matrix: "outputs/posterior_covariance.jld2"  # warm-start from prior run


# ── 5. LLH / DERIVED ────────────────────────────────────────────────────────

llh_bins: 15   # bins per axis for 2D likelihood scans  (RunMode: LLH)
thinning:  1   # thinning for bin-importance diagnostics (RunMode: derived)


# ── 6. SHARED BINNING ───────────────────────────────────────────────────────
# True-energy and zenith binning shared across all detectors.

nBins_Etrue:  30
range_Etrue:  [1, 21]   # MeV
nBins_cosz:   20        # cos(zenith) bins from −1 (upward) to 0 (horizontal)


# ── 7. INPUT FILES ───────────────────────────────────────────────────────────

solar_model_file:               "inputs/AGSS09_high_z.jld2"
flux_model_file:                "inputs/fluxes.jld2"
earth_model_file:               "inputs/EARTH_MODEL_PREM_DENSE.dat"
earth_uncertainty_file:         "inputs/earth_uncertainty_4.5e-5.jld2"
earth_normalisation_prior_file: "inputs/earth_uncertainty_cov.jld2"
solar_exposure_file:            "inputs/solarExposure.csv"

data_file: "data.txt"   # only used when Asimov: false


# ── 8. DETECTORS ─────────────────────────────────────────────────────────────
# List active detectors here; only those named in active_detectors are loaded.
#
# Per-detector keys:
#   CC/ES_exposure          module-years  (1 module-yr ≈ 10 kt-yr)
#   singleChannel           false | "ES" | "CC"
#   inclusiveMode           fold CC signal into ES reco bins
#   semiInclusiveMode       forward-hemisphere inclusive; backward exclusive
#   use_scattering_info     enable ES angular cos-scatter likelihood
#   ES_cos_cut              minimum cos(scatter) for ES forward-hemisphere cut
#   nBins_Ereco_ES/CC       reconstructed-energy bins
#   range_Ereco_ES/CC       [min, max] MeV
#   Ereco_min_ES/CC         analysis threshold MeV
#   nBins_cos_scatter       cos(scatter) bins  (only if use_scattering_info)
#   reconstruction_sample_* CSV files for detector response matrices
#   ES/CC_background_files  CSV files for background shapes
#   ES/CC_background_normalisations   nominal background fluxes (cm⁻²s⁻¹)
#   ES/CC_background_systematics      fractional uncertainty  (e.g. 0.02 = 2%)

active_detectors: [HD]

detectors:

  # VD — vertical-drift detector, inclusive / semi-inclusive analysis
  VD:
    CC_exposure: 40
    ES_exposure: 40
    singleChannel:      false
    inclusiveMode:      true
    semiInclusiveMode:  false
    use_scattering_info: true
    ES_cos_cut: 0.0

    nBins_Ereco_ES:   30
    nBins_Ereco_CC:   30
    range_Ereco_ES:   [2, 20]
    range_Ereco_CC:   [2, 20]
    Ereco_min_ES:     3
    Ereco_min_CC:     3
    nBins_cos_scatter: 25

    reconstruction_sample_CC:         "inputs/inputs_neutronOnly_may2026/Nu/3D/data_file_CC_1mFidu_discri_200Emin.csv"
    reconstruction_sample_ES_nue:     "inputs/inputs_neutronOnly_may2026/Nu/3D/data_file_ES_nue_1mFidu_discri_100Emin.csv"
    reconstruction_sample_ES_nuother: "inputs/inputs_neutronOnly_may2026/Nu/3D/data_file_ES_numutau_1mFidu_discri_100Emin.csv"
    reconstruction_sample_ES_angle:   "inputs/ES_angular_reco.csv"

    ES_background_files:
      - "inputs/inputs_neutronOnly_may2026/Nbkg/3D/data_file_Nbkg_1mFidu_discri_100Emin_longW.csv"
      - "inputs/inputs_neutronOnly_may2026/Nbkg/3D/data_file_Nbkg_1mFidu_discri_100Emin_Bottom.csv"
      - "inputs/inputs_neutronOnly_may2026/Nbkg/3D/data_file_Nbkg_1mFidu_discri_100Emin_shortW.csv"
    CC_background_files:
      - "inputs/neutron_bg_CC_sergio_withFullCuts.csv"
      - "inputs/gamma_bg_CC_sergio_withFullCuts.csv"

    ES_background_normalisations: [2.2e-6, 2.2e-6, 2.2e-6]   # cm⁻²s⁻¹
    CC_background_normalisations: [6.6e-9, 6.6e-9]
    ES_background_systematics:    [0.02, 0.02, 0.02]
    CC_background_systematics:    [0.02, 0.02]

  # HD — horizontal-drift detector, CC-only standard analysis
  HD:
    CC_exposure: 20
    ES_exposure: 20
    singleChannel:      "CC"
    inclusiveMode:      false
    semiInclusiveMode:  false
    use_scattering_info: false
    ES_cos_cut: 0.5

    nBins_Ereco_ES:   30
    nBins_Ereco_CC:   30
    range_Ereco_ES:   [1, 15]
    range_Ereco_CC:   [1, 25]
    Ereco_min_ES:     3
    Ereco_min_CC:     3
    nBins_cos_scatter: 25

    reconstruction_sample_CC:         "inputs/sergio_reco_CC_withFullCuts.csv"
    reconstruction_sample_ES_nue:     "inputs/inputs_neutronOnly_may2026/Nu/3D/data_file_ES_nue_1mFidu_discri_100Emin.csv"
    reconstruction_sample_ES_nuother: "inputs/inputs_neutronOnly_may2026/Nu/3D/data_file_ES_numutau_1mFidu_discri_100Emin.csv"
    reconstruction_sample_ES_angle:   "inputs/ES_angular_reco.csv"

    ES_background_files:
      - "inputs/inputs_neutronOnly_may2026/Nbkg/3D/data_file_Nbkg_1mFidu_discri_100Emin_longW.csv"
      - "inputs/inputs_neutronOnly_may2026/Nbkg/3D/data_file_Nbkg_1mFidu_discri_100Emin_Bottom.csv"
      - "inputs/inputs_neutronOnly_may2026/Nbkg/3D/data_file_Nbkg_1mFidu_discri_100Emin_shortW.csv"
    CC_background_files:
      - "inputs/neutron_bg_CC_sergio_withFullCuts.csv"
      - "inputs/gamma_bg_CC_sergio_withFullCuts.csv"

    ES_background_normalisations: [2.2e-6, 2.2e-6]
    CC_background_normalisations: [2.2e-6, 2.2e-6]
    ES_background_systematics:    [0.02, 0.02]
    CC_background_systematics:    [0.02, 0.02]
